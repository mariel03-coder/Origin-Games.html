<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>GLOBAL SCANNER - TOUCH EDITION</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
:root {
  --neon-pink: #ff00ff;
  --neon-blue: #00ffff;
  --p1-color: #ff4d4d;
  --p2-color: #4da6ff;
  --arcade-black: #0a0a0a;
}
* { box-sizing: border-box; }
body {
  background-color: var(--arcade-black);
  color: white;
  font-family: 'Press Start 2P', cursive;
  margin: 0;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  user-select: none;
  touch-action: manipulation;
}
#main-display {
  height: 40vh;
  border-bottom: 4px solid #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(to bottom, #1a1a1a, #000);
  position: relative;
}
#item-icon { font-size: 60px; margin-bottom: 10px; }
#item-name { font-size: 12px; text-align: center; color: var(--neon-blue); padding: 0 10px; }
#question-num { font-size: 9px; color: #666; margin-top: 6px; }
#timer-container { width: 100%; height: 8px; background: #222; position: absolute; bottom: 0; }
#timer-bar { width: 100%; height: 100%; background: var(--neon-pink); transition: width 0.1s linear; }
#music-btn {
  position: absolute;
  top: 8px; right: 8px;
  background: #222;
  border: 2px solid #555;
  color: white;
  font-family: 'Press Start 2P', cursive;
  font-size: 8px;
  padding: 5px 7px;
  cursor: pointer;
}
#controls-container {
  height: 60vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
  background: #000;
}
.player-side {
  display: grid;
  grid-template-rows: auto 1fr;
  gap: 10px;
}
.score-header {
  text-align: center;
  font-size: 11px;
  padding: 5px;
  border: 2px solid;
}
.p1-ui { border-color: var(--p1-color); color: var(--p1-color); }
.p2-ui { border-color: var(--p2-color); color: var(--p2-color); }
.button-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 8px;
}
.arc-button {
  border: 4px solid #444;
  background: #222;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 9px;
  font-family: 'Press Start 2P', cursive;
  padding: 5px;
  cursor: pointer;
  transition: transform 0.05s;
}
.arc-button:active { transform: scale(0.95); background: #444; }
.correct-flash { background: #00ff00 !important; color: black !important; border-color: #00ff00 !important; }
.wrong-flash { background: #ff0000 !important; border-color: #ff0000 !important; }
.modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.97);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  text-align: center;
  padding: 20px;
}
.modal h1 { color: var(--neon-blue); font-size: 18px; margin-bottom: 20px; line-height: 1.6; }
.modal p { font-size: 10px; color: #aaa; margin-bottom: 30px; line-height: 1.8; }
button.start-btn {
  padding: 20px 30px;
  font-family: 'Press Start 2P', cursive;
  font-size: 12px;
  background: var(--neon-pink);
  color: white;
  border: none;
  box-shadow: 0 0 15px var(--neon-pink);
  cursor: pointer;
  margin-top: 10px;
}
.result-scores { display: flex; gap: 30px; margin: 20px 0; }
.result-player { text-align: center; }
.result-player .name { font-size: 10px; margin-bottom: 10px; }
.result-player .score { font-size: 24px; }
.winner-text { color: #ffd700; font-size: 11px; margin-bottom: 20px; line-height: 1.8; }
</style>
</head>
<body>

<div id="start-screen" class="modal">
  <h1>GLOBAL<br>SCANNER</h1>
  <p>2 PLAYERS &middot; TOUCH READY<br>TAP THE CORRECT COUNTRY!</p>
  <button class="start-btn" onclick="startGame()">&#9654; START GAME</button>
</div>

<div id="end-screen" class="modal" style="display:none;">
  <h1>GAME OVER</h1>
  <div class="result-scores">
    <div class="result-player">
      <div class="name" style="color:var(--p1-color)">P1</div>
      <div class="score" style="color:var(--p1-color)" id="final-s0">0</div>
    </div>
    <div class="result-player">
      <div class="name" style="color:var(--p2-color)">P2</div>
      <div class="score" style="color:var(--p2-color)" id="final-s1">0</div>
    </div>
  </div>
  <div class="winner-text" id="winner-text">&#127942; DRAW!</div>
  <button class="start-btn" onclick="location.reload()">&#8635; PLAY AGAIN</button>
</div>

<div id="main-display">
  <button id="music-btn" onclick="toggleMusic()">&#128266; BGM</button>
  <div id="item-icon">?</div>
  <div id="item-name">GET READY...</div>
  <div id="question-num"></div>
  <div id="timer-container"><div id="timer-bar"></div></div>
</div>

<div id="controls-container">
  <div class="player-side">
    <div class="score-header p1-ui">P1: <span id="s0">0</span></div>
    <div class="button-grid" id="grid0">
      <div class="arc-button" onclick="handleTap(0,0)">?</div>
      <div class="arc-button" onclick="handleTap(0,1)">?</div>
      <div class="arc-button" onclick="handleTap(0,2)">?</div>
      <div class="arc-button" onclick="handleTap(0,3)">?</div>
    </div>
  </div>
  <div class="player-side">
    <div class="score-header p2-ui">P2: <span id="s1">0</span></div>
    <div class="button-grid" id="grid1">
      <div class="arc-button" onclick="handleTap(1,0)">?</div>
      <div class="arc-button" onclick="handleTap(1,1)">?</div>
      <div class="arc-button" onclick="handleTap(1,2)">?</div>
      <div class="arc-button" onclick="handleTap(1,3)">?</div>
    </div>
  </div>
</div>

<script>
const gameData = [
  { item: "Ferrari", icon: "&#127950;&#65039;", options: ["Italy", "Germany", "France", "USA"], correct: 0 },
  { item: "Sushi", icon: "&#127843;", options: ["China", "Japan", "Korea", "Thailand"], correct: 1 },
  { item: "Ikea", icon: "&#128715;&#65039;", options: ["Norway", "Denmark", "Sweden", "Finland"], correct: 2 },
  { item: "Lego", icon: "&#129522;", options: ["Sweden", "Denmark", "USA", "Germany"], correct: 1 },
  { item: "Maple Syrup", icon: "&#127809;", options: ["Canada", "Russia", "USA", "UK"], correct: 0 },
  { item: "Taco", icon: "&#127790;", options: ["Spain", "Mexico", "Brazil", "Peru"], correct: 1 },
  { item: "Guinness", icon: "&#127866;", options: ["UK", "Ireland", "Germany", "Belgium"], correct: 1 },
  { item: "Origami", icon: "&#129410;", options: ["China", "Korea", "Japan", "Vietnam"], correct: 2 },
  { item: "Croissant", icon: "&#129360;", options: ["Italy", "Spain", "France", "Austria"], correct: 2 },
  { item: "Kimchi", icon: "&#129388;", options: ["China", "Japan", "Vietnam", "Korea"], correct: 3 }
];

let scores = [0, 0];
let currentQuestion = 0;
let canAnswer = false;
let timeLeft = 100;
let timerInterval;

// --- Audio Engine ---
let audioCtx = null;
let musicOn = true;
let musicBeat = 0;
let musicTimer = null;

function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, volume, delay) {
  try {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime + (delay||0));
    gain.gain.setValueAtTime(volume||0.15, ctx.currentTime + (delay||0));
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + (delay||0) + duration);
    osc.start(ctx.currentTime + (delay||0));
    osc.stop(ctx.currentTime + (delay||0) + duration + 0.05);
  } catch(e) {}
}

function sfxCorrect() {
  playTone(523, 'square', 0.08, 0.2, 0);
  playTone(659, 'square', 0.08, 0.2, 0.09);
  playTone(784, 'square', 0.08, 0.2, 0.18);
  playTone(1047,'square', 0.2,  0.2, 0.27);
}

function sfxWrong() {
  playTone(200, 'sawtooth', 0.08, 0.2, 0);
  playTone(150, 'sawtooth', 0.15, 0.2, 0.09);
}

function sfxTimeout() {
  playTone(300, 'square', 0.05, 0.15, 0);
  playTone(250, 'square', 0.05, 0.15, 0.06);
  playTone(200, 'square', 0.15, 0.15, 0.12);
}

function sfxStart() {
  [262,330,392,523].forEach((f,i) => playTone(f,'square',0.12,0.18,i*0.1));
}

function sfxGameOver() {
  [523,494,440,392,349].forEach((f,i) => playTone(f,'square',0.18,0.2,i*0.12));
}

const bgmPattern = [
  {f:392,d:0.12},{f:330,d:0.12},{f:294,d:0.12},{f:330,d:0.12},
  {f:392,d:0.12},{f:392,d:0.12},{f:392,d:0.22},{f:0,d:0.1},
  {f:330,d:0.12},{f:330,d:0.12},{f:330,d:0.22},{f:0,d:0.1},
  {f:392,d:0.12},{f:494,d:0.12},{f:494,d:0.22},{f:0,d:0.1},
];

function playBGMNote() {
  if (!musicOn) return;
  const note = bgmPattern[musicBeat % bgmPattern.length];
  if (note.f > 0) playTone(note.f, 'square', note.d * 0.8, 0.06, 0);
  musicTimer = setTimeout(playBGMNote, note.d * 1000);
  musicBeat++;
}

function startBGM() {
  stopBGM();
  if (!musicOn) return;
  getAudio();
  playBGMNote();
}

function stopBGM() {
  if (musicTimer) { clearTimeout(musicTimer); musicTimer = null; }
}

function toggleMusic() {
  musicOn = !musicOn;
  document.getElementById('music-btn').textContent = musicOn ? '&#128266; BGM' : '&#128263; BGM';
  if (musicOn) startBGM(); else stopBGM();
}

// --- Game Logic ---
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  sfxStart();
  setTimeout(startBGM, 500);
  nextQuestion();
}

function nextQuestion() {
  if (currentQuestion >= gameData.length) {
    endGame(); return;
  }
  const q = gameData[currentQuestion];
  document.getElementById('item-icon').innerHTML = q.icon;
  document.getElementById('item-name').innerText = 'WHERE IS ' + q.item.toUpperCase() + ' FROM?';
  document.getElementById('question-num').innerText = 'Q' + (currentQuestion+1) + ' / ' + gameData.length;
  [0,1].forEach(pIdx => {
    const buttons = document.getElementById('grid'+pIdx).children;
    for(let i=0;i<4;i++) {
      buttons[i].innerText = q.options[i];
      buttons[i].className = 'arc-button';
    }
  });
  canAnswer = true;
  startTimer();
}

function startTimer() {
  timeLeft = 100;
  clearInterval(timerInterval);
  document.getElementById('timer-bar').style.width = '100%';
  document.getElementById('timer-bar').style.background = 'var(--neon-pink)';
  timerInterval = setInterval(() => {
    timeLeft -= 1;
    const bar = document.getElementById('timer-bar');
    bar.style.width = timeLeft + '%';
    if (timeLeft < 30) bar.style.background = '#ff4400';
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      canAnswer = false;
      sfxTimeout();
      currentQuestion++;
      setTimeout(nextQuestion, 1200);
    }
  }, 80);
}

function handleTap(playerIdx, answerIdx) {
  if (!canAnswer) return;
  const q = gameData[currentQuestion];
  const buttons = document.getElementById('grid'+playerIdx).children;
  const tappedButton = buttons[answerIdx];
  if (answerIdx === q.correct) {
    canAnswer = false;
    clearInterval(timerInterval);
    const bonus = Math.ceil(timeLeft / 10);
    scores[playerIdx] += 10 + bonus;
    document.getElementById('s'+playerIdx).innerText = scores[playerIdx];
    tappedButton.classList.add('correct-flash');
    sfxCorrect();
    currentQuestion++;
    setTimeout(nextQuestion, 1500);
  } else {
    tappedButton.classList.add('wrong-flash');
    scores[playerIdx] = Math.max(0, scores[playerIdx] - 5);
    document.getElementById('s'+playerIdx).innerText = scores[playerIdx];
    sfxWrong();
    setTimeout(() => tappedButton.classList.remove('wrong-flash'), 500);
  }
}

function endGame() {
  clearInterval(timerInterval);
  stopBGM();
  sfxGameOver();
  document.getElementById('final-s0').innerText = scores[0];
  document.getElementById('final-s1').innerText = scores[1];
  let winText = '';
  if (scores[0] > scores[1]) winText = '&#127942; PLAYER 1 WINS!';
  else if (scores[1] > scores[0]) winText = '&#127942; PLAYER 2 WINS!';
  else winText = '&#129309; IT\'S A DRAW!';
  document.getElementById('winner-text').innerHTML = winText;
  document.getElementById('end-screen').style.display = 'flex';
}
</script>
</body>
</html>
